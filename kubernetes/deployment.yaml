apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deployment
  labels:
    app: flask-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
spec:
  containers:
  - name: flask-app
    image: nexuscorp-app:latest
    ports:
    - containerPort: 5000
    env:
    - name: DB_HOST
      value: "postgres-service"