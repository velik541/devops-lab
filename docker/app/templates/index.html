<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise DevOps Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>NexusCorp DevOps</h1>
        <p>High-Availability Enterprise Cluster Environment</p>
        
        <div class="db-box">
            <h3>Database Status:</h3>
            <p class="db-info">{{ db_status }}</p>
            <p class="db-visits">Total platform hits: <strong>{{ visit_count }}</strong></p>
        </div>

        <span class="badge">Status: Operational</span>
        <div class="footer">Powered by Docker • PostgreSQL • Flask • Nginx</div>
    </div>
</body>
</html>
